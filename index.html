<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="copy.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration Form</title>
  </head>

  <body>
    <div class="main">
      <p class="sign" align="center">Registration form</p>
      <form class="form1">
        <input
          class="email"
          type="text" name="name"
          align="center"
          placeholder="Enter your Email"
        />
        <input
          class="password"
          type="password"
          align="center"
          placeholder="Enter the Password"
        />
        <a class="submit" align="center" href="main.html">Register</a>
        <p class="forgot" align="center">Forgot Password?</p>
      </form>
    <script src="copy.js"></script>
  </body>
</html>
